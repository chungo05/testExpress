<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAQ_Software_Terminal_v5.0</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #00ff41;
            --accent: #008f11;
            --dim: #003b00;
            --abort: #ff3e3e;
            --key: #ffff00;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #terminal { width: 100%; max-width: 900px; border: 1px solid var(--accent); padding: 25px; box-shadow: 0 0 20px var(--dim); position: relative; }
        h1, h2 { text-transform: uppercase; border-bottom: 2px solid var(--accent); padding-bottom: 5px; margin-top: 0; }
        .btn { display: block; width: 100%; background: none; border: 1px solid var(--accent); color: var(--text); padding: 12px; margin: 8px 0; cursor: pointer; text-align: left; font-family: inherit; transition: 0.1s; }
        .btn:hover { background: var(--dim); }
        .btn-send { border-color: var(--key); color: var(--key); margin-top: 10px; text-align: center; }
        .btn-abort { border-color: var(--abort); color: var(--abort); margin-top: 30px; font-weight: bold; }
        .hidden { display: none; }
        input { width: 100%; background: none; border: none; border-bottom: 1px solid var(--text); color: var(--text); font-family: inherit; font-size: 1.1em; outline: none; padding: 10px 0; margin-top: 10px; }
        .key-box { color: var(--key); background: #222; padding: 10px; border-left: 4px solid var(--key); margin: 15px 0; }
        .badge { background: var(--abort); color: white; padding: 2px 6px; font-size: 0.7em; margin-left: 10px; border-radius: 3px; }
        #stats-panel { font-size: 0.8em; margin-top: 20px; opacity: 0.8; border-top: 1px dashed var(--accent); padding-top: 10px; }
        #review-mode-indicator { color: var(--key); font-weight: bold; border: 1px solid var(--key); padding: 5px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="view-menu">
        <h1>SISTEMA_ESTUDIO_SOFTWARE_v5.0</h1>
        <p>> User: Massimo (Software_Engineer_UAQ)</p>
        <div id="menu-items"></div>
        <button class="btn" id="global-review-btn" style="border-color: var(--key); color: var(--key);" onclick="startReview('ALL')">> [REINTENTO_GENERAL] REPASAR TODOS LOS ERRORES</button>
        <div id="stats-panel"></div>
    </div>

    <div id="view-quiz" class="hidden">
        <div id="review-mode-indicator" class="hidden">MODO_REINTENTO_ERRORES</div>
        <h2 id="quiz-title"></h2>
        <p id="question-text" style="font-size: 1.1em;"></p>
        
        <div id="tf-options" class="hidden">
            <button class="btn" onclick="processAnswer(true)">> [T] VERDADERO</button>
            <button class="btn" onclick="processAnswer(false)">> [F] FALSO</button>
        </div>

        <div id="open-options" class="hidden">
            <input type="text" id="open-answer" placeholder="Escribe tu respuesta..." autocomplete="off">
            <button class="btn btn-send" onclick="showKey()">> ENVIAR_RESPUESTA (Enter)</button>
            <div id="answer-key" class="hidden">
                <div class="key-box"><strong>[SISTEMA_REF]:</strong> <span id="key-text"></span></div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" onclick="processAnswer(true)">[SÍ] CORRECTO</button>
                    <button class="btn" style="color:var(--abort); border-color:var(--abort);" onclick="processAnswer(false)">[NO] INCORRECTO</button>
                </div>
            </div>
        </div>
        <button class="btn btn-abort" onclick="initMenu()">> [ESC] ABORTAR</button>
    </div>

    <div id="view-results" class="hidden">
        <h1>RESUMEN_DE_SESIÓN</h1>
        <p id="final-score" style="font-size: 1.5em;"></p>
        <button class="btn" id="block-review-btn" style="border-color: var(--key); color: var(--key);">> REINTENTAR ERRORES DE ESTE BLOQUE</button>
        <button class="btn" onclick="initMenu()">> VOLVER_AL_MENU</button>
    </div>
</div>

<script>
    const quizData = [
        {
            title: "Ingeniería de Requerimientos",
            questions: [
                { id: "r1", q: "¿Un requerimiento es una condición pedida a una persona u otra entidad?", type: "tf", a: true, key: "Definición básica" },
                { id: "r2", q: "¿La viabilidad operativa evalúa si el sistema será aceptado por los usuarios?", type: "tf", a: true, key: "Correcto" },
                { id: "r3", q: "¿Los requerimientos de usuario se expresan solo en diagramas técnicos?", type: "tf", a: false, key: "Lenguaje natural y diagramas" },
                { id: "r4", q: "¿La técnica de cuestionarios permite involucrar a más personas y puntos de vista?", type: "tf", a: true, key: "Correcto" },
                { id: "r5", q: "¿Los requerimientos funcionales pesan un 25% en la ponderación?", type: "tf", a: true, key: "Correcto" },
                { id: "r6", q: "¿Qué evalúa la viabilidad técnica?", type: "open", key: "Posibilidad de actualizar/incrementar recursos técnicos" },
                { id: "r7", q: "¿Cómo se clasifican los requerimientos de sistema?", type: "open", key: "Funcionales y No Funcionales" },
                { id: "r8", q: "¿Qué porcentaje tienen los requerimientos tecnológicos?", type: "open", key: "10%" },
                { id: "r9", q: "Menciona los 3 tipos clave de viabilidad.", type: "open", key: "Técnica, Económica, Operativa" },
                { id: "r10", q: "¿Qué documento debe definir exactamente qué se realizará?", type: "open", key: "Requerimientos del sistema" }
            ]
        },
        {
            title: "Toma de Decisiones",
            questions: [
                { id: "d1", q: "¿La primera etapa es la identificación de un problema?", type: "tf", a: true, key: "Correcto" },
                { id: "d2", q: "¿La implantación requiere conseguir el compromiso de los afectados?", type: "tf", a: true, key: "Correcto" },
                { id: "d3", q: "¿El desarrollo de alternativas consiste en presentar opciones factibles?", type: "tf", a: true, key: "Correcto" },
                { id: "d4", q: "¿Si un problema persiste, se debe retomar una fase anterior?", type: "tf", a: true, key: "Correcto" },
                { id: "d5", q: "¿La asignación de ponderaciones ayuda a priorizar criterios?", type: "tf", a: true, key: "Correcto" },
                { id: "d6", q: "¿Qué debe disponer el administrador para actuar ante un problema?", type: "open", key: "Autoridad, dinero e información" },
                { id: "d7", q: "¿Por qué el análisis de alternativas puede ser subjetivo?", type: "open", key: "Por el juicio de valor del responsable" },
                { id: "d8", q: "¿Qué implica la etapa de 'Selección'?", type: "open", key: "Elegir la mejor opción según el procedimiento" },
                { id: "d9", q: "¿Cómo se define el problema?", type: "open", key: "Discrepancia entre estado actual y deseado" },
                { id: "d10", q: "¿Qué se debe evaluar al final del proceso?", type: "open", key: "La efectividad de la decisión" }
            ]
        },
        {
            title: "Ambiente Organizacional",
            questions: [
                { id: "a1", q: "¿El ambiente se basa en las emociones de los miembros?", type: "tf", a: true, key: "Correcto" },
                { id: "a2", q: "¿Un buen clima favorece el trabajo en equipo?", type: "tf", a: true, key: "Correcto" },
                { id: "a3", q: "¿Starbucks trata a empleados como socios?", type: "tf", a: true, key: "Correcto" },
                { id: "a4", q: "¿La falta de motivación es un peligro de un mal ambiente?", type: "tf", a: true, key: "Correcto" },
                { id: "a5", q: "¿El ambiente solo afecta la parte física?", type: "tf", a: false, key: "Afecta parte física, emocional y mental" },
                { id: "a6", q: "Menciona 2 beneficios de un buen clima.", type: "open", key: "Rendimiento, integración, imagen, trabajo equipo" },
                { id: "a7", q: "¿Cuáles son los 3 peligros de un mal ambiente?", type: "open", key: "Falta motivación, baja productividad, mala imagen" },
                { id: "a8", q: "¿Qué factor en Starbucks fomenta el bienestar grupal?", type: "open", key: "Colectivismo" },
                { id: "a9", q: "Menciona una característica estructural del ambiente.", type: "open", key: "Efectos del ambiente organizacional" },
                { id: "a10", q: "¿Con qué se relaciona directamente el ambiente organizacional?", type: "open", key: "Con la motivación de los empleados" }
            ]
        },
        {
            title: "Muestreo y Observación",
            questions: [
                { id: "m1", q: "¿El muestreo de tiempos usa intervalos al azar?", type: "tf", a: true, key: "Correcto" },
                { id: "m2", q: "¿El muestreo de eventos observa comportamientos íntegros?", type: "tf", a: true, key: "Correcto" },
                { id: "m3", q: "¿La observación consume mucho tiempo del analista?", type: "tf", a: true, key: "Correcto" },
                { id: "m4", q: "¿El muestreo de tiempos es para eventos únicos?", type: "tf", a: false, key: "Es para actividades frecuentes" },
                { id: "m5", q: "¿Una ventaja es ver eventos conforme suceden?", type: "tf", a: true, key: "Correcto" },
                { id: "m6", q: "Define Muestreo de Tiempos.", type: "open", key: "Intervalos específicos para observar actividades de gerentes" },
                { id: "m7", q: "Ejemplo de Muestreo de Eventos.", type: "open", key: "Reuniones de consejo o entrenamiento" },
                { id: "m8", q: "¿Qué se pierde al observar?", type: "open", key: "Muestra representativa de decisiones frecuentes" },
                { id: "m9", q: "Propósito del muestreo.", type: "open", key: "Obtener vista representativa de actividades" },
                { id: "m10", q: "¿Cómo se eligen los intervalos en tiempos?", type: "open", key: "Al azar (ej. 5 intervalos de 10 min)" }
            ]
        },
        {
            title: "Diagrama de Contexto",
            questions: [
                { id: "c1", q: "¿Representa el sistema como un solo proceso?", type: "tf", a: true, key: "Correcto" },
                { id: "c2", q: "¿Las relaciones son líneas etiquetadas?", type: "tf", a: true, key: "Correcto" },
                { id: "c3", q: "¿Las entidades pasivas inician eventos?", type: "tf", a: false, key: "Son las entidades activas" },
                { id: "c4", q: "¿Define el alcance de la investigación?", type: "tf", a: true, key: "Correcto" },
                { id: "c5", q: "¿Entidad autónoma está separada del sistema?", type: "tf", a: true, key: "Correcto" },
                { id: "c6", q: "¿Qué son los cuadros etiquetados?", type: "open", key: "Entidades o Actores" },
                { id: "c7", q: "Define entidad Cooperativa.", type: "open", key: "Predecible y usada para resultados deseados" },
                { id: "c8", q: "¿Cómo se representan los árboles de decisión?", type: "open", key: "Diagramas de flujo de sistemas" },
                { id: "c9", q: "Qué muestra además del proceso?", type: "open", key: "Flujos de información con entidades externas" },
                { id: "c10", q: "Entidad que afecta vía restricciones?", type: "open", key: "Autónoma (Independiente)" }
            ]
        },
        {
            title: "Gestión de Proyectos",
            questions: [
                { id: "p1", q: "¿Curva de esfuerzo vs tiempo?", type: "tf", a: true, key: "Correcto" },
                { id: "p2", q: "¿Cédula en Inicio?", type: "tf", a: true, key: "Correcto" },
                { id: "p3", q: "¿Ejecución es mayor esfuerzo?", type: "tf", a: true, key: "Correcto" },
                { id: "p4", q: "¿Cierre incluye aprendizaje?", type: "tf", a: true, key: "Correcto" },
                { id: "p5", q: "¿Planeación permite calendario?", type: "tf", a: true, key: "Correcto" },
                { id: "p6", q: "¿Resultado de planeación?", type: "open", key: "Plan inicial del proyecto" },
                { id: "p7", q: "2 actividades de Ejecución.", type: "open", key: "Dirigir equipo, reunir, comunicar, resolver conflictos" },
                { id: "p8", q: "¿Documentos en cierre?", type: "open", key: "Se archivan" },
                { q: "¿Qué perfecciona la planeación?", type: "open", key: "Alcance del proyecto" },
                { id: "p10", q: "Actividad final de cierre.", type: "open", key: "Informe final" }
            ]
        }
    ];

    let currentSessionQuestions = [];
    let idxQ = 0;
    let score = 0;
    let isReviewMode = false;
    let currentBlockTitle = "";

    function initMenu() {
        showV('view-menu');
        isReviewMode = false;
        const list = document.getElementById('menu-items');
        list.innerHTML = '';
        const errors = getErrors();
        
        quizData.forEach((b, i) => {
            const blockErrors = errors.filter(e => e.block === b.title).length;
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = `> BLOCK_${i+1}: ${b.title} ${blockErrors > 0 ? `<span class="badge">${blockErrors} ERR</span>` : ''}`;
            btn.onclick = () => startQuiz(b.title, false);
            list.appendChild(btn);
        });

        const totalErrors = errors.length;
        document.getElementById('global-review-btn').style.display = totalErrors > 0 ? 'block' : 'none';
        document.getElementById('global-review-btn').innerHTML = `> [REINTENTO_GENERAL] TODOS LOS ERRORES (${totalErrors})`;
        updateStats();
    }

    function startQuiz(tag, reviewOnly) {
        isReviewMode = reviewOnly;
        currentBlockTitle = tag;
        const allQuestions = tag === 'ALL' ? quizData.flatMap(b => b.questions.map(q => ({...q, block: b.title}))) : quizData.find(b => b.title === tag).questions.map(q => ({...q, block: tag}));
        
        if (reviewOnly) {
            const errors = getErrors();
            currentSessionQuestions = tag === 'ALL' ? errors : errors.filter(e => e.block === tag);
        } else {
            currentSessionQuestions = allQuestions.slice(0, 10);
        }

        if (currentSessionQuestions.length === 0) { alert("No hay errores para repasar."); return; }
        
        idxQ = 0; score = 0;
        showV('view-quiz');
        if (isReviewMode) show('review-mode-indicator'); else hide('review-mode-indicator');
        render();
    }

    function render() {
        const q = currentSessionQuestions[idxQ];
        document.getElementById('quiz-title').innerText = `${isReviewMode ? 'REPASO' : q.block} [${idxQ + 1}/${currentSessionQuestions.length}]`;
        document.getElementById('question-text').innerText = q.q;
        hide('tf-options'); hide('open-options'); hide('answer-key');
        if (q.type === 'tf') show('tf-options');
        else { show('open-options'); document.getElementById('open-answer').value = ''; }
    }

    function processAnswer(isCorrectInput) {
        const q = currentSessionQuestions[idxQ];
        let actualCorrect = false;

        if (q.type === 'tf') actualCorrect = (q.a === isCorrectInput);
        else actualCorrect = isCorrectInput; // self-grade input

        if (actualCorrect) {
            score++;
            removeError(q.id);
        } else {
            if (!isReviewMode) logError(q);
            if (q.type === 'tf') alert(`[LOG]: INCORRECTO. ${q.key}`);
        }
        step();
    }

    function showKey() { show('answer-key'); document.getElementById('key-text').innerText = currentSessionQuestions[idxQ].key; }
    function step() { idxQ++; if (idxQ < currentSessionQuestions.length) render(); else end(); }

    function end() {
        showV('view-results');
        document.getElementById('final-score').innerText = isReviewMode ? `REPASO COMPLETADO: ${score}/${currentSessionQuestions.length}` : `PUNTUACIÓN: ${score}/10`;
        if (!isReviewMode) localStorage.setItem(`massimo_v5_${currentBlockTitle}`, score);
        
        const errors = getErrors();
        const blockErrors = errors.filter(e => e.block === currentBlockTitle).length;
        document.getElementById('block-review-btn').style.display = blockErrors > 0 ? 'block' : 'none';
        document.getElementById('block-review-btn').onclick = () => startQuiz(currentBlockTitle, true);
    }

    // --- LOGICA DE ERRORES ---
    function getErrors() { return JSON.parse(localStorage.getItem('massimo_errors_v5') || '[]'); }
    function logError(q) {
        let errs = getErrors();
        if (!errs.some(e => e.id === q.id)) { errs.push(q); localStorage.setItem('massimo_errors_v5', JSON.stringify(errs)); }
    }
    function removeError(id) {
        let errs = getErrors();
        errs = errs.filter(e => e.id !== id);
        localStorage.setItem('massimo_errors_v5', JSON.stringify(errs));
    }
    function startReview(tag) { startQuiz(tag, true); }

    function updateStats() {
        let s = ">> LOG_HISTORIAL:<br>";
        quizData.forEach(b => {
            const val = localStorage.getItem(`massimo_v5_${b.title}`) || 0;
            s += `   - ${b.title}: ${val}/10<br>`;
        });
        document.getElementById('stats-panel').innerHTML = s;
    }

    document.getElementById('open-answer').addEventListener('keypress', (e) => { if (e.key === 'Enter') showKey(); });
    function showV(id) { ['view-menu', 'view-quiz', 'view-results'].forEach(v => hide(v)); show(id); }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    initMenu();
</script>

</body>
</html>
