<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAQ_Software_Terminal_v5.0</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #00ff41;
            --accent: #008f11;
            --dim: #003b00;
            --abort: #ff3e3e;
            --key: #ffff00;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        #terminal { 
            width: 95%; 
            max-width: 850px; 
            border: 1px solid var(--accent); 
            padding: 15px; 
            box-shadow: 0 0 20px var(--dim); 
            margin-top: 20px;
            box-sizing: border-box;
        }

        /* TITULOS RESPONSIVOS */
        h1 { 
            font-size: clamp(1.1rem, 5vw, 1.8rem); 
            text-transform: uppercase; 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 8px; 
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.2;
        }
        h2 { 
            font-size: clamp(0.9rem, 4vw, 1.4rem); 
            border-bottom: 1px solid var(--accent);
            padding-bottom: 5px;
            word-wrap: break-word;
        }

        .btn { display: block; width: 100%; background: none; border: 1px solid var(--accent); color: var(--text); padding: 12px; margin: 8px 0; cursor: pointer; text-align: left; font-family: inherit; font-size: 0.9rem; }
        .btn:hover { background: var(--dim); }
        .btn-send { border-color: var(--key); color: var(--key); text-align: center; font-weight: bold; }
        .btn-abort { border-color: var(--abort); color: var(--abort); margin-top: 25px; }
        .hidden { display: none; }
        input { width: 100%; background: none; border: none; border-bottom: 1px solid var(--text); color: var(--text); font-family: inherit; font-size: 1rem; outline: none; padding: 10px 0; box-sizing: border-box; }
        .key-box { color: var(--key); background: #1a1a1a; padding: 10px; border-left: 4px solid var(--key); margin: 15px 0; font-size: 0.9rem; }
        .badge { background: var(--abort); color: white; padding: 2px 5px; font-size: 0.7rem; float: right; border-radius: 2px; }
        #stats-panel { font-size: 0.75rem; margin-top: 20px; opacity: 0.8; border-top: 1px dashed var(--accent); padding-top: 10px; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="view-menu">
        <h1>SISTEMA_ESTUDIO_SOFTWARE_v6.0</h1>
        <p style="font-size:0.8rem;">> Hector Elordi @UAQ_Software_Engineering</p>
        <div id="menu-items"></div>
        <button class="btn" id="global-review-btn" style="border-color: var(--key); color: var(--key);" onclick="startQuiz('ALL', true)">> [REINTENTO_GENERAL] TODOS LOS ERRORES</button>
        <div id="stats-panel"></div>
    </div>

    <div id="view-quiz" class="hidden">
        <div id="mode-tag" style="color: var(--key); font-size: 0.7rem; margin-bottom: 5px;"></div>
        <h2 id="quiz-title"></h2>
        <p id="question-text" style="line-height: 1.4;"></p>
        
        <div id="tf-options" class="hidden">
            <button class="btn" onclick="processAnswer(true)">> [T] VERDADERO</button>
            <button class="btn" onclick="processAnswer(false)">> [F] FALSO</button>
        </div>

        <div id="open-options" class="hidden">
            <input type="text" id="open-answer" placeholder="Escribir respuesta..." autocomplete="off">
            <button class="btn btn-send" onclick="showKey()">> [SEND] ENVIAR_RESPUESTA</button>
            <div id="answer-key" class="hidden">
                <div class="key-box"><strong>[SISTEMA_REF]:</strong> <span id="key-text"></span></div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" onclick="processAnswer(true)">[SÍ] CORRECTO</button>
                    <button class="btn" style="color:var(--abort); border-color:var(--abort);" onclick="processAnswer(false)">[NO] INCORRECTO</button>
                </div>
            </div>
        </div>
        <button class="btn btn-abort" onclick="initMenu()">> [ESC] ABORTAR_SESIÓN</button>
    </div>

    <div id="view-results" class="hidden">
        <h1>RESUMEN_EJECUTIVO</h1>
        <p id="final-score" style="font-size: 1.3rem;"></p>
        <button class="btn" id="block-review-btn" style="border-color: var(--key); color: var(--key);">> REINTENTAR ERRORES DE ESTE BLOQUE</button>
        <button class="btn" onclick="initMenu()">> VOLVER_AL_MENU</button>
    </div>
</div>

<script>
    const quizData = [
        { title: "Ingeniería de Requerimientos", questions: [
            { id: "r1", q: "¿Un requerimiento es una condición pedida a una persona u otra entidad?", type: "tf", a: true, key: "Definición básica" },
            { id: "r2", q: "¿La viabilidad operativa evalúa la aceptación de los usuarios?", type: "tf", a: true, key: "Correcto" },
            { id: "r3", q: "¿Los requerimientos de usuario son solo texto?", type: "tf", a: false, key: "Lenguaje natural y diagramas" },
            { id: "r4", q: "¿Los cuestionarios permiten múltiples puntos de vista?", type: "tf", a: true, key: "Correcto" },
            { id: "r5", q: "¿Ponderación funcional es 25%?", type: "tf", a: true, key: "Correcto" },
            { id: "r6", q: "¿Qué evalúa la viabilidad técnica?", type: "open", key: "Incrementar recursos técnicos actuales" },
            { id: "r7", q: "¿Clasificación de requerimientos de sistema?", type: "open", key: "Funcionales y No Funcionales" },
            { id: "r8", q: "¿Ponderación de tecnológicos?", type: "open", key: "10%" },
            { id: "r9", q: "3 tipos clave de viabilidad.", type: "open", key: "Técnica, Económica, Operativa" },
            { id: "r10", q: "Documento preciso que define qué se hará.", type: "open", key: "Requerimientos del sistema" }
        ]},
        { title: "Toma de Decisiones", questions: [
            { id: "d1", q: "¿Etapa 1: Análisis de alternativas?", type: "tf", a: false, key: "Identificación de problema" },
            { id: "d2", q: "¿Implantación requiere compromiso?", type: "tf", a: true, key: "Correcto" },
            { id: "d3", q: "¿Desarrollo de alternativas es presentar opciones?", type: "tf", a: true, key: "Correcto" },
            { id: "d4", q: "¿Si falla, se retoma fase anterior?", type: "tf", a: true, key: "Correcto" },
            { id: "d5", q: "¿Ponderación prioriza criterios?", type: "tf", a: true, key: "Correcto" },
            { id: "d6", q: "¿Qué requiere el administrador para actuar?", type: "open", key: "Autoridad, dinero e información" },
            { id: "d7", q: "¿Por qué el análisis es subjetivo?", type: "open", key: "Por el juicio de valor" },
            { id: "d8", q: "¿En qué consiste la Selección?", type: "open", key: "Elegir mejor opción según procedimiento" },
            { id: "d9", q: "¿Definición de problema?", type: "open", key: "Discrepancia entre estado actual y deseado" },
            { id: "d10", q: "¿Qué evaluar al final?", type: "open", key: "La efectividad" }
        ]},
        { title: "Ambiente Organizacional", questions: [
            { id: "a1", q: "¿Basado en emociones de miembros?", type: "tf", a: true, key: "Correcto" },
            { id: "a2", q: "¿Buen clima favorece equipo?", type: "tf", a: true, key: "Correcto" },
            { id: "a3", q: "¿Peligro: baja productividad?", type: "tf", a: true, key: "Correcto" },
            { id: "a4", q: "¿Starbucks fomenta colectivismo?", type: "tf", a: true, key: "Correcto" },
            { id: "a5", q: "¿Ambiente solo es físico?", type: "tf", a: false, key: "Físico, emocional y mental" },
            { id: "a6", q: "2 beneficios de buen clima.", type: "open", key: "Rendimiento, integración, imagen" },
            { id: "a7", q: "3 peligros de mal ambiente.", type: "open", key: "Desmotivación, baja productividad, mala imagen" },
            { id: "a8", q: "¿Qué otorga Starbucks?", type: "open", key: "Premios y trato de socios" },
            { id: "a9", q: "¿Con qué se relaciona el ambiente?", type: "open", key: "Motivación del personal" },
            { id: "a10", q: "Elemento social del ambiente.", type: "open", key: "Interacción entre miembros" }
        ]},
        { title: "Muestreo y Observación", questions: [
            { id: "m1", q: "¿Tiempos usa intervalos al azar?", type: "tf", a: true, key: "Correcto" },
            { id: "m2", q: "¿Eventos observa comportamientos íntegros?", type: "tf", a: true, key: "Correcto" },
            { id: "m3", q: "¿Tiempos es para eventos únicos?", type: "tf", a: false, key: "Es para actividades frecuentes" },
            { id: "m4", q: "¿Ventaja: ver eventos suceder?", type: "tf", a: true, key: "Correcto" },
            { id: "m5", q: "¿Observación consume tiempo?", type: "tf", a: true, key: "Correcto" },
            { id: "m6", q: "Define Muestreo de Tiempos.", type: "open", key: "Intervalos específicos para observar gerentes" },
            { id: "m7", q: "Ejemplo de evento completo.", type: "open", key: "Reunión de consejo" },
            { id: "m8", q: "¿Qué se pierde observando?", type: "open", key: "Muestra de decisiones frecuentes" },
            { id: "m9", q: "Propósito del muestreo.", type: "open", key: "Vista representativa de actividades" },
            { id: "m10", q: "Frecuencia recomendada en tiempos.", type: "open", key: "Intervalos escogidos al azar" }
        ]},
        { title: "Diagrama de Contexto", questions: [
            { id: "c1", q: "¿Representa sistema como proceso único?", type: "tf", a: true, key: "Correcto" },
            { id: "c2", q: "¿Relaciones son líneas etiquetadas?", type: "tf", a: true, key: "Correcto" },
            { id: "c3", q: "¿Entidad activa es estática?", type: "tf", a: false, key: "Es dinámica e inicia eventos" },
            { id: "c4", q: "¿Define alcance?", type: "tf", a: true, key: "Correcto" },
            { id: "c5", q: "¿Entidad autónoma afecta vía restricciones?", type: "tf", a: true, key: "Correcto" },
            { id: "c6", q: "¿Qué son los cuadros?", type: "open", key: "Entidades o Actores" },
            { id: "c7", q: "Define entidad Pasiva.", type: "open", key: "Estática, no interactúa seguido" },
            { id: "c8", q: "¿Dónde van árboles de decisión?", type: "open", key: "Diagramas de flujo de sistemas" },
            { id: "c9", q: "¿Qué muestra el flujo?", type: "open", key: "Información con entidades externas" },
            { id: "c10", q: "Entidad Cooperativa.", type: "open", key: "Predecible y usada para resultados" }
        ]},
        { title: "Gestión de Proyectos", questions: [
            { id: "p1", q: "¿Curva esfuerzo vs tiempo?", type: "tf", a: true, key: "Correcto" },
            { id: "p2", q: "¿Planeación da plan inicial?", type: "tf", a: true, key: "Correcto" },
            { id: "p3", q: "¿Cédula en Ejecución?", type: "tf", a: false, key: "En Inicio" },
            { id: "p4", q: "¿Cierre incluye aprendizaje?", type: "tf", a: true, key: "Correcto" },
            { id: "p5", q: "¿Ejecución involucra resolver conflictos?", type: "tf", a: true, key: "Correcto" },
            { id: "p6", q: "¿Qué se archiva al final?", type: "open", key: "Documentos del proyecto" },
            { id: "p7", q: "Actividad de planeación.", type: "open", key: "Crear calendario, integrar actividades" },
            { id: "p8", q: "¿Qué se reconoce en el cierre?", type: "open", key: "Logros y resultados" },
            { id: "p9", q: "¿Qué requiere la Ejecución?", type: "open", key: "Dirigir equipo, asegurar recursos" },
            { id: "p10", q: "Eje Y del gráfico de ciclo de vida.", type: "open", key: "Esfuerzo" }
        ]}
    ];

    let currentSession = [];
    let idx = 0;
    let score = 0;
    let isReview = false;
    let bTag = "";

    function initMenu() {
        showV('view-menu');
        isReview = false;
        const m = document.getElementById('menu-items');
        m.innerHTML = '';
        const errs = getErrs();
        
        quizData.forEach((b, i) => {
            const count = errs.filter(e => e.block === b.title).length;
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = `> BLOCK_${i+1}: ${b.title} ${count > 0 ? `<span class="badge">${count} ERR</span>` : ''}`;
            btn.onclick = () => startQuiz(b.title, false);
            m.appendChild(btn);
        });

        const total = errs.length;
        const gBtn = document.getElementById('global-review-btn');
        gBtn.style.display = total > 0 ? 'block' : 'none';
        gBtn.innerText = `> [REINTENTO_GENERAL] TODOS LOS ERRORES (${total})`;
        updateH();
    }

    function startQuiz(tag, reviewMode) {
        isReview = reviewMode;
        bTag = tag;
        const qSrc = tag === 'ALL' ? quizData.flatMap(b => b.questions.map(q => ({...q, block: b.title}))) : quizData.find(b => b.title === tag).questions.map(q => ({...q, block: tag}));
        
        if (reviewMode) {
            const errs = getErrs();
            currentSession = tag === 'ALL' ? errs : errs.filter(e => e.block === tag);
        } else {
            currentSession = qSrc.slice(0, 10);
        }

        if (currentSession.length === 0) return;
        
        idx = 0; score = 0;
        showV('view-quiz');
        const mTag = document.getElementById('mode-tag');
        mTag.innerText = isReview ? 'MODO: REINTENTO_ERRORES' : '';
        mTag.style.display = isReview ? 'block' : 'none';
        render();
    }

    function render() {
        const q = currentSession[idx];
        document.getElementById('quiz-title').innerText = `${isReview ? 'REPASO' : q.block} [${idx + 1}/${currentSession.length}]`;
        document.getElementById('question-text').innerText = q.q;
        hide('tf-options'); hide('open-options'); hide('answer-key');
        if (q.type === 'tf') show('tf-options');
        else { show('open-options'); document.getElementById('open-answer').value = ''; }
    }

    function processAnswer(okIn) {
        const q = currentSession[idx];
        let ok = (q.type === 'tf') ? (q.a === okIn) : okIn;

        if (ok) {
            score++;
            remErr(q.id);
        } else {
            if (!isReview) addErr(q);
            if (q.type === 'tf') alert(`[LOG]: INCORRECTO. ${q.key}`);
        }
        next();
    }

    function showKey() { show('answer-key'); document.getElementById('key-text').innerText = currentSession[idx].key; }
    function next() { idx++; if (idx < currentSession.length) render(); else finish(); }

    function finish() {
        showV('view-results');
        document.getElementById('final-score').innerText = isReview ? `REINTENTO COMPLETADO: ${score}/${currentSession.length}` : `PUNTUACIÓN: ${score}/10`;
        if (!isReview) localStorage.setItem(`uaq_v6_${bTag}`, score);
        
        const count = getErrs().filter(e => e.block === bTag).length;
        const rBtn = document.getElementById('block-review-btn');
        rBtn.style.display = (count > 0 && !isReview) ? 'block' : 'none';
        rBtn.onclick = () => startQuiz(bTag, true);
    }

    function getErrs() { return JSON.parse(localStorage.getItem('uaq_errs_v6') || '[]'); }
    function addErr(q) {
        let e = getErrs();
        if (!e.some(item => item.id === q.id)) { e.push(q); localStorage.setItem('uaq_errs_v6', JSON.stringify(e)); }
    }
    function remErr(id) {
        let e = getErrs();
        e = e.filter(item => item.id !== id);
        localStorage.setItem('uaq_errs_v6', JSON.stringify(e));
    }

    function updateH() {
        let h = ">> LOG_SCORE:<br>";
        quizData.forEach(b => {
            const v = localStorage.getItem(`uaq_v6_${b.title}`) || 0;
            h += `   - ${b.title}: ${v}/10<br>`;
        });
        document.getElementById('stats-panel').innerHTML = h;
    }

    document.getElementById('open-answer').addEventListener('keypress', (e) => { if (e.key === 'Enter') showKey(); });
    function showV(id) { ['view-menu', 'view-quiz', 'view-results'].forEach(v => hide(v)); show(id); }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    initMenu();
</script>

</body>
</html>
