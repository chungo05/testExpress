<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAQ_Software_Terminal_v7.0</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #00ff41;
            --accent: #008f11;
            --dim: #003b00;
            --abort: #ff3e3e;
            --key: #ffff00;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        #terminal { 
            width: 95%; 
            max-width: 850px; 
            border: 1px solid var(--accent); 
            padding: 15px; 
            box-shadow: 0 0 20px var(--dim); 
            margin-top: 20px;
            box-sizing: border-box;
        }

        /* Títulos Responsivos */
        h1 { 
            font-size: clamp(1.1rem, 5vw, 1.8rem); 
            text-transform: uppercase; 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 8px; 
            word-wrap: break-word;
            line-height: 1.2;
        }
        h2 { 
            font-size: clamp(0.9rem, 4vw, 1.4rem); 
            border-bottom: 1px solid var(--accent);
            padding-bottom: 5px;
            word-wrap: break-word;
        }

        .btn { display: block; width: 100%; background: none; border: 1px solid var(--accent); color: var(--text); padding: 12px; margin: 8px 0; cursor: pointer; text-align: left; font-family: inherit; font-size: 0.9rem; }
        .btn:hover { background: var(--dim); }
        .btn-send { border-color: var(--key); color: var(--key); text-align: center; font-weight: bold; margin-top: 10px; }
        .btn-abort { border-color: var(--abort); color: var(--abort); margin-top: 25px; }
        .hidden { display: none; }
        input { width: 100%; background: none; border: none; border-bottom: 1px solid var(--text); color: var(--text); font-family: inherit; font-size: 1rem; outline: none; padding: 10px 0; box-sizing: border-box; }
        .key-box { color: var(--key); background: #1a1a1a; padding: 10px; border-left: 4px solid var(--key); margin: 15px 0; font-size: 0.9rem; }
        .badge { background: var(--abort); color: white; padding: 2px 5px; font-size: 0.7rem; float: right; border-radius: 2px; }
        #stats-panel { font-size: 0.75rem; margin-top: 20px; opacity: 0.8; border-top: 1px dashed var(--accent); padding-top: 10px; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="view-menu">
        <h1>SISTEMA_ESTUDIO_SOFTWARE_v7.0</h1>
        <p style="font-size:0.8rem;">> User: Massimo@UAQ</p>
        <div id="menu-items"></div>
        <button class="btn" id="global-review-btn" style="border-color: var(--key); color: var(--key);" onclick="startQuiz('ALL', true)">> [REINTENTO_GENERAL] TODOS LOS ERRORES</button>
        <div id="stats-panel"></div>
    </div>

    <div id="view-quiz" class="hidden">
        <div id="mode-tag" style="color: var(--key); font-size: 0.7rem; margin-bottom: 5px; font-weight: bold;">MODO: REINTENTO_ERRORES</div>
        <h2 id="quiz-title"></h2>
        <p id="question-text" style="line-height: 1.4;"></p>
        
        <div id="tf-options" class="hidden">
            <button class="btn" onclick="processAnswer(true)">> [T] VERDADERO</button>
            <button class="btn" onclick="processAnswer(false)">> [F] FALSO</button>
        </div>

        <div id="open-options" class="hidden">
            <input type="text" id="open-answer" placeholder="Escribir respuesta..." autocomplete="off">
            <button class="btn btn-send" id="btn-submit-open" onclick="showKey()">> [SEND] ENVIAR_RESPUESTA</button>
            <div id="answer-key" class="hidden">
                <div class="key-box"><strong>[SISTEMA_REF]:</strong> <span id="key-text"></span></div>
                <p>¿Calificar como correcto?</p>
                <div style="display:flex; gap:10px;">
                    <button class="btn" onclick="processAnswer(true)">[SÍ] CORRECTO</button>
                    <button class="btn" style="color:var(--abort); border-color:var(--abort);" onclick="processAnswer(false)">[NO] INCORRECTO</button>
                </div>
            </div>
        </div>
        <button class="btn btn-abort" onclick="initMenu()">> [ESC] ABORTAR_SESIÓN</button>
    </div>

    <div id="view-results" class="hidden">
        <h1>RESUMEN_EJECUTIVO</h1>
        <p id="final-score" style="font-size: 1.3rem;"></p>
        <button class="btn" id="block-review-btn" style="border-color: var(--key); color: var(--key);">> REINTENTAR ERRORES DE ESTE BLOQUE</button>
        <button class="btn" onclick="initMenu()">> VOLVER_AL_MENU</button>
    </div>
</div>

<script>
    const quizData = [
        {
            title: "Requerimientos de Sistema",
            questions: [
                { id: "r1", q: "¿Un requerimiento es una condición pedida a una persona u otra entidad?", type: "tf", a: true, key: "Definición básica de requerimiento." },
                { id: "r2", q: "¿Los requerimientos de usuario se escriben solo en diagramas técnicos?", type: "tf", a: false, key: "Se escriben en lenguaje natural y diagramas." },
                { id: "r3", q: "¿La viabilidad operativa evalúa si el sistema será aceptado por los usuarios?", type: "tf", a: true, key: "Correcto, es la aceptación operativa." },
                { id: "r4", q: "¿Los requerimientos funcionales pesan un 50% en la ponderación?", type: "tf", a: false, key: "Pesan un 25%." },
                { id: "r5", q: "¿La viabilidad económica incluye el costo del hardware y software?", type: "tf", a: true, key: "Sí, es parte de los costos básicos." },
                { id: "r6", q: "¿Qué técnica permite involucrar a muchas personas con diferentes puntos de vista?", type: "open", key: "Cuestionarios." },
                { id: "r7", q: "¿Qué debe evaluar el analista en la viabilidad técnica?", type: "open", key: "Si es posible actualizar o incrementar los recursos técnicos actuales." },
                { id: "r8", q: "¿Cómo se clasifican los requerimientos de sistema?", type: "open", key: "Funcionales y No Funcionales." },
                { id: "r9", q: "¿Qué tipo de requerimiento se refiere a 'Equipos'?", type: "open", key: "Tecnológicos." },
                { id: "r10", q: "¿Qué se debe evaluar al final de una decisión?", type: "open", key: "La efectividad (si se corrigió el problema)." }
            ]
        },
        {
            title: "Toma de Decisiones",
            questions: [
                { id: "d1", q: "¿La primera etapa es la asignación de ponderaciones?", type: "tf", a: false, key: "Es la Identificación del Problema." },
                { id: "d2", q: "¿El análisis de alternativas estudia fortalezas y debilidades?", type: "tf", a: true, key: "Sí, comparándolas con criterios ordenados." },
                { id: "d3", q: "¿La implantación requiere conseguir el compromiso de los afectados?", type: "tf", a: true, key: "Vital para el éxito de la decisión." },
                { id: "d4", q: "¿Todas las alternativas tienen la misma viabilidad económica?", type: "tf", a: false, key: "No, cada alternativa tiene sus propios costos." },
                { id: "d5", q: "¿Si un problema persiste, se debe retomar una fase anterior?", type: "tf", a: true, key: "Sí, para corregir el error en el proceso." },
                { id: "d6", q: "¿Qué es la identificación de un problema?", type: "open", key: "Detección de una discrepancia entre el estado actual y el deseado." },
                { id: "d7", q: "¿Por qué se asignan ponderaciones a los criterios?", type: "open", key: "Porque no todos tienen la misma relevancia." },
                { id: "d8", q: "¿Qué es el desarrollo de alternativas?", type: "open", key: "Obtener y presentar todas las opciones factibles." },
                { id: "d9", q: "¿Qué factor puede hacer que el análisis de alternativas sea subjetivo?", type: "open", key: "El juicio de valor del responsable." },
                { id: "d10", q: "¿Qué facilita la aceptación de una decisión?", type: "open", key: "La participación de los responsables de ejecutarla." }
            ]
        },
        {
            title: "Ambiente Organizacional",
            questions: [
                { id: "a1", q: "¿Un buen clima organizacional reduce los beneficios de la empresa?", type: "tf", a: false, key: "Al contrario, los aumenta." },
                { id: "a2", q: "¿Starbucks trata a sus empleados como socios?", type: "tf", a: true, key: "Es parte de su estrategia de clima positivo." },
                { id: "a3", q: "¿El ambiente organizacional se basa en las emociones de los miembros?", type: "tf", a: true, key: "Sí, y se relaciona con la motivación." },
                { id: "a4", q: "¿La mala imagen de la empresa es un peligro de un mal ambiente?", type: "tf", a: true, key: "Sí, es uno de los tres peligros principales." },
                { id: "a5", q: "¿El ambiente físico no influye en el comportamiento organizacional?", type: "tf", a: false, key: "Sí influye como parte de los efectos ambientales." },
                { id: "a6", q: "Menciona 2 beneficios de un buen clima organizacional.", type: "open", key: "Rendimiento laboral, integración, imagen de empresa, trabajo equipo." },
                { id: "a7", q: "¿A qué se refiere el término 'colectivismo' en el caso Starbucks?", type: "open", key: "Fomentar el trabajo y bienestar grupal." },
                { id: "a8", q: "¿Cuáles son los 3 peligros de un mal ambiente?", type: "open", key: "Falta de motivación, baja productividad y mala imagen." },
                { id: "a9", q: "¿Qué factores personales afectan el ambiente?", type: "open", key: "Emociones, motivación mental y física." },
                { id: "a10", q: "¿En qué se basa el rendimiento laboral según el tema?", type: "open", key: "En el clima y motivación organizacional." }
            ]
        },
        {
            title: "Muestreo y Observación",
            questions: [
                { id: "m1", q: "¿El muestreo de tiempos usa intervalos escogidos intencionalmente?", type: "tf", a: false, key: "Usa intervalos escogidos al azar." },
                { id: "m2", q: "¿El muestreo de eventos observa comportamientos en su contexto natural?", type: "tf", a: true, key: "Sí, comportamientos íntegros." },
                { id: "m3", q: "¿Una ventaja de la observación es ver comportamientos conforme suceden?", type: "tf", a: true, key: "Es su mayor beneficio." },
                { id: "m4", q: "¿El muestreo de tiempos es ideal para eventos poco frecuentes?", type: "tf", a: false, key: "Es para actividades que suceden con mucha frecuencia." },
                { id: "m5", q: "¿La observación consume poco tiempo del analista?", type: "tf", a: false, key: "Es una de sus desventajas (consume mucho tiempo)." },
                { id: "m6", q: "Define Muestreo de Tiempos.", type: "open", key: "Poner intervalos específicos para observar actividades." },
                { id: "m7", q: "Da un ejemplo de Muestreo de Eventos.", type: "open", key: "Reuniones de consejo o sesiones de entrenamiento." },
                { id: "m8", q: "¿Qué se puede perder al usar observación?", type: "open", key: "Una muestra representativa de decisiones frecuentes." },
                { id: "m9", q: "¿Cuál es el propósito del muestreo para el analista?", type: "open", key: "Obtener una vista representativa de las actividades." },
                { id: "m10", q: "¿Cómo se eligen los intervalos en muestreo de tiempos?", type: "open", key: "Al azar (ej. 5 intervalos de 10 min)." }
            ]
        },
        {
            title: "Diagrama de Contexto",
            questions: [
                { id: "c1", q: "¿El diagrama de contexto representa el sistema como múltiples procesos?", type: "tf", a: false, key: "Se representa como un solo proceso." },
                { id: "c2", q: "¿Las entidades externas definen el alcance de la investigación?", type: "tf", a: true, key: "Sí, delimitan la relación con el exterior." },
                { id: "c3", q: "¿Una entidad autónoma interactúa directamente con el sistema?", type: "tf", a: false, key: "Lo afecta indirectamente mediante restricciones." },
                { id: "c4", q: "¿Las relaciones se dibujan con líneas etiquetadas?", type: "tf", a: true, key: "Sí, indicando el flujo de información." },
                { id: "c5", q: "¿El proceso central identifica la función principal?", type: "tf", a: true, key: "Exacto, es el corazón del diagrama." },
                { id: "c6", q: "¿Qué es una entidad Activa?", type: "open", key: "Entidad dinámica que inicia eventos para un objetivo." },
                { id: "c7", q: "¿Qué es una entidad Pasiva?", type: "open", key: "Entidad estática que no interactúa frecuentemente." },
                { id: "c8", q: "¿Qué representa el círculo o rectángulo central?", type: "open", key: "El sistema analizado." },
                { id: "c9", q: "¿Qué diferencia a una entidad cooperativa?", type: "open", key: "Es predecible y usada para alcanzar resultados deseados." },
                { id: "c10", q: "¿En qué otros diagramas se representan los árboles de decisión?", type: "open", key: "Diagramas de flujo de sistemas." }
            ]
        },
        {
            title: "Gestión de Proyectos",
            questions: [
                { id: "p1", q: "¿La cédula del proyecto nace en la fase de planeación?", type: "tf", a: false, key: "Nace en la fase de Inicio." },
                { id: "p2", q: "¿La fase de mayor esfuerzo es la Ejecución?", type: "tf", a: true, key: "Sí, es el pico de la curva de esfuerzo." },
                { id: "p3", q: "¿El cierre incluye el aprendizaje de la experiencia?", type: "tf", a: true, key: "Sí, es fundamental para la mejora." },
                { id: "p4", q: "¿En la planeación se definen los recursos humanos?", type: "tf", a: true, key: "Sí, equipo, materiales y personal." },
                { id: "p5", q: "¿La revisión del proceso es parte de la Ejecución?", type: "tf", a: false, key: "Es parte de la fase de Cierre." },
                { id: "p6", q: "¿Qué se genera al final de la fase de planeación?", type: "open", key: "El plan inicial del proyecto." },
                { id: "p7", q: "¿Menciona 2 actividades de la fase de ejecución?", type: "open", key: "Dirigir equipo, reunirse, comunicar, resolver conflictos." },
                { id: "p8", q: "¿Qué sucede con los documentos en el cierre?", type: "open", key: "Se archivan." },
                { id: "p9", q: "¿Qué permite perfeccionar la fase de planeación?", type: "open", key: "El alcance del proyecto." },
                { id: "p10", q: "¿Cuáles son los ejes del gráfico del ciclo de vida?", type: "open", key: "Esfuerzo (Y) y Tiempo (X)." }
            ]
        }
    ];

    let currentSession = [];
    let idx = 0;
    let score = 0;
    let isReview = false;
    let bTag = "";

    function initMenu() {
        showV('view-menu');
        isReview = false;
        const m = document.getElementById('menu-items');
        m.innerHTML = '';
        const errs = getErrs();
        
        quizData.forEach((b, i) => {
            const count = errs.filter(e => e.block === b.title).length;
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = `> BLOCK_${i+1}: ${b.title} ${count > 0 ? `<span class="badge">${count} ERR</span>` : ''}`;
            btn.onclick = () => startQuiz(b.title, false);
            m.appendChild(btn);
        });

        const total = errs.length;
        const gBtn = document.getElementById('global-review-btn');
        gBtn.style.display = total > 0 ? 'block' : 'none';
        gBtn.innerText = `> [REINTENTO_GENERAL] TODOS LOS ERRORES (${total})`;
        updateH();
    }

    function startQuiz(tag, reviewMode) {
        isReview = reviewMode;
        bTag = tag;
        const qSrc = tag === 'ALL' ? quizData.flatMap(b => b.questions.map(q => ({...q, block: b.title}))) : quizData.find(b => b.title === tag).questions.map(q => ({...q, block: tag}));
        
        if (reviewMode) {
            const errs = getErrs();
            currentSession = tag === 'ALL' ? errs : errs.filter(e => e.block === tag);
        } else {
            currentSession = qSrc.slice(0, 10);
        }

        if (currentSession.length === 0) return;
        
        idx = 0; score = 0;
        showV('view-quiz');
        document.getElementById('mode-tag').style.display = isReview ? 'block' : 'none';
        render();
    }

    function render() {
        const q = currentSession[idx];
        document.getElementById('quiz-title').innerText = `${isReview ? 'REPASO' : q.block || bTag} [${idx + 1}/${currentSession.length}]`;
        document.getElementById('question-text').innerText = q.q;
        hide('tf-options'); hide('open-options'); hide('answer-key');
        if (q.type === 'tf') show('tf-options');
        else { show('open-options'); document.getElementById('open-answer').value = ''; }
    }

    function processAnswer(okIn) {
        const q = currentSession[idx];
        let ok = (q.type === 'tf') ? (q.a === okIn) : okIn;

        if (ok) {
            score++;
            remErr(q.id);
        } else {
            if (!isReview) addErr(q, q.block || bTag);
            if (q.type === 'tf') alert(`[LOG]: INCORRECTO. ${q.key}`);
        }
        next();
    }

    function showKey() { show('answer-key'); document.getElementById('key-text').innerText = currentSession[idx].key; }
    function next() { idx++; if (idx < currentSession.length) render(); else finish(); }

    function finish() {
        showV('view-results');
        document.getElementById('final-score').innerText = isReview ? `REINTENTO COMPLETADO: ${score}/${currentSession.length}` : `PUNTUACIÓN: ${score}/10`;
        if (!isReview) localStorage.setItem(`uaq_v7_${bTag}`, score);
        
        const count = getErrs().filter(e => e.block === bTag).length;
        const rBtn = document.getElementById('block-review-btn');
        rBtn.style.display = (count > 0 && !isReview) ? 'block' : 'none';
        rBtn.onclick = () => startQuiz(bTag, true);
    }

    function getErrs() { return JSON.parse(localStorage.getItem('uaq_errs_v7') || '[]'); }
    function addErr(q, blockName) {
        let e = getErrs();
        if (!e.some(item => item.id === q.id)) { 
            e.push({...q, block: blockName}); 
            localStorage.setItem('uaq_errs_v7', JSON.stringify(e)); 
        }
    }
    function remErr(id) {
        let e = getErrs();
        e = e.filter(item => item.id !== id);
        localStorage.setItem('uaq_errs_v7', JSON.stringify(e));
    }

    function updateH() {
        let h = ">> LOG_SCORE:<br>";
        quizData.forEach(b => {
            const v = localStorage.getItem(`uaq_v7_${b.title}`) || 0;
            h += `   - ${b.title}: ${v}/10<br>`;
        });
        document.getElementById('stats-panel').innerHTML = h;
    }

    document.getElementById('open-answer').addEventListener('keypress', (e) => { if (e.key === 'Enter') showKey(); });
    function showV(id) { ['view-menu', 'view-quiz', 'view-results'].forEach(v => hide(v)); show(id); }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    initMenu();
</script>

</body>
</html>
